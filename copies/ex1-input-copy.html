<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex1-input-copy</title>
</head>

<body>

    <div style="background-color: black; color: green;">
        <br>
        <h2>
            INPUT EXERCISE
        </h2>
        <br>
        <div style="background-color: gray; color: snow;">
            <form action="#" method="post">
                <label for="password"><b>Password</b></label>
                <input type="text" id="password" placeholder="password">
                <label for="Email "><b>Email </b></label>
                <input type="email" id="Email " placeholder="Email ">
                <label for="Date of birth"><b>Date of birth</b></label>
                <input type="date" id="Date of birth" placeholder="Date of birth">
                <h2>GENDER:</h2>
                <label for="male"><b>Male</b></label>
                <input type="radio" name="gender" id="male">
                <label for="female"><b>Female</b></label>
                <input type="radio" name="gender" id="female">
                <label for="kids"><b>Kids</b></label>
                <input type="radio" name="gender" id="kids">
                <br>
                <button style="background-color: black; color: green;" type="submit">
                    <p><b>Submit</b></p>
                </button>
            </form>
        </div>
    </div>

</body>

</html>
