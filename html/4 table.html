<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Theme</title>

</head>

<body>


  <table border="2" bordercolor="dodgerblue">
    <tr>
      <th colspan="2">text</th>
      <th>text</th>
      <th>text</th>
      <th rowspan="4">text</th>
    </tr>

    <tr>
      <td>text</td>
      <td colspan="2" rowspan="2">text</td>
      <td>text</td>
    </tr>

    <tr>
      <td>text</td>
      <td>text</td>
    </tr>
    
    <tr>
      <td>text</td>
      <td>text</td>
      <td>text</td>
      <td>text</td>
    </tr>
  </table>
