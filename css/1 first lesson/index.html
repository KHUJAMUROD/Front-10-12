<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Css Lesson</title>
    <link rel="stylesheet" href="style.css">
</head>

<!-- <body style="background-color: black; color: snow;"> -->

<body>

    <h1 class="testclass">heading 1</h1>
    <h1 id="testid1">heading 2</h1>
    <h1 style="color: dodgerblue;">heading 3</h1>
    <h1 title="since 1976">heading 4</h1>


    <main id="first-main">
        <p style="color: darkred;">Lorem ipsum dolor sit amet.</p>
        <div>
            <p>Lorem ipsum dolor sit amet.</p>
            <aside>
                <p>Lorem ipsum dolor sit amet.</p>
            </aside>
        </div>
    </main>


    <button id="test-id2-b" class="btn-class">button</button>
    <input id="test-id2-b" class="btn-class" type="button" value="input">

    <p title="test-title-similar">Lorem, ipsum dolor.</p>
    <h6 title="test-title-similar">Lorem, ipsum dolor.</h6>



    <span>span span span</span>
    <br>
    <br>
    <em>Lorem, ipsum dolor.</em>
    <br>
    <button>button</button>
    <button>button</button>
    <button>button</button>
    <button>button</button>
</body>
<style>
    body {
        /* background-color: black; */
        /* color: snow; */
    }

    main>p {
        font-size: 30px;
        color: green;
    }


    em+br+button {
        color: green;
        background-color: black;
    }

    em~button {
        color: green;
        background-color: black;
    }

    em,
    span {
        color: gold;
        background-color: #333;
    }

    p[title="test-title-similar"] {
        color: red;
    }

    h6[title="test-title-similar"] {
        color: blue;
    }

    button#test-id2-b {
        background-color: black;
    }


    input#test-id2-b {
        background-color: darkblue;
    }


    button.btn-class {
        color: red;
    }

    input.btn-class {
        color: green;
    }

    .testclass {
        color: red;
    }


    #testid1 {
        background-color: gray;
    }

    [title="since 1976"] {
        color: green;
    }


    #first-main div aside p {
        color: blue;
    }
</style>

</html>
