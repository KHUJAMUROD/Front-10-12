<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <div class="container">
        <div class="row1">
            <div>222</div>
            <div style="background-color: #333;">222</div>
            <div>222</div>
        </div>
        <div class="row2">
            <div class="left">55555</div>
            <div class="right" style="background-color: lightgray;">
                <div class="top">
                    <div>55</div>
                    <div>55</div>
                </div>
                <div class="bottom">
                    <div>343</div>
                    <div>55</div>
                    <div style="background-color: red;">55</div>
                    <div style="background-color: red;"></div>
                    <div style="margin: -30px 0 0 0;">555</div>
                    <div>1313</div>
                </div>
            </div>
        </div>
    </div>

</body>

<style>
    body {
        background-color: #333;
    }

    .container {
        width: 600px;
        height: 500px;
        margin: 50px auto;
        display: grid;
        grid-template: 1fr 3fr / 1fr;
        gap: 10px;
    }

    .row1 {
        background-color: gray;
    }

    .row2  div:not(:nth-child(2)) {
        background-color: lightgray;
    }

    .row1 {
        display: grid;
        grid-template: 1fr / 2fr 1fr 1fr ;
        gap: 10px;
    }

    .row2 {
        display: grid;
        grid-template: 1fr / 1fr 3fr;
        gap: 10px;
    }

    .right {
        display: grid;
        grid-template: 1fr 2fr / 1fr ;
        gap: 10px;
        padding: 10px;
    }

    .right .top div,
    .right .bottom div:not(:nth-child(2)) {
        background-color: #fff;
    }

    .top{
        display: grid;
        grid-template: 1fr / 1fr 2.07fr;
        gap: 10px;
    }

    .bottom{
        display: grid;
        grid-template: 1fr 1fr / 1fr 1fr 1fr;
        gap: 10px;
    }


</style>

</html>
