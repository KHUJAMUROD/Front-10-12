<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font-Family</title>
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com">

        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Gloria+Hallelujah&display=swap"

</head>

<body>

    <p class="p1">Lorem ipsum dolor sit amet.</p>
    <p class="p2">Explicabo totam praesentium delectus animi.</p>
    <p class="p3">Architecto voluptatum similique odio. Iste!</p>
    <p class="p4">Voluptas eius ex aperiam excepturi.</p>
    <p class="p5">Eos eum architecto ipsam quam?</p>

<style>
    /* @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Gloria+Hallelujah&display=swap'); */


    .p1 {
        font-family: 'Courier New', Courier, monospace;
    }


    .p2 {
        font-family: "Dancing Script", cursive;
        font-optical-sizing: auto;
        font-weight: 400;
        font-style: normal;
    }

    .p3 {
        font-family: "Gloria Hallelujah", cursive;
        font-weight: 400;
        font-style: normal;
    }

    @font-face {
        font-family: 'Creepster';
        src: url(/font/Creepster/Creepster-Regular.ttf);
    }


    @font-face {
        font-family: 'LibreBarcode39';
        src: url(/font/Libre_Barcode_39/LibreBarcode39-Regular.ttf);
    }

    .p4 {
        font-family: 'Creepster';
    }

    .p5 {
        font-family: 'LibreBarcode39';
    }
</style>

</html>
